<section class="flex min-h-screen items-center justify-center bg-white px-4 py-12 text-slate-50">
  <div class="w-full max-w-md rounded-3xl border border-slate-800 bg-mist-200/90 p-8 shadow-2xl shadow-slate-950/60">
    <div class="mb-8 space-y-2 text-gray-600">
      <p class="text-sm font-semibold uppercase tracking-[0.3em]">Task App</p>
      <h1 class="text-3xl font-semibold">Welcome</h1>
      <p class="text-sm">Please sign in</p>
    </div>

    <form class="space-y-5" [formGroup]="loginForm" (ngSubmit)="submit()">
      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-600" for="username">Username</label>
        <input
          id="username"
          type="text"
          formControlName="username"
          class="w-full rounded-2xl border border-slate-700 bg-mist-400 px-4 py-3 text-sm text-gray-900 outline-none transition focus:border-b-blue-900"
          placeholder="Enter your username"
        />
        @if (loginForm.controls.username.touched && loginForm.controls.username.invalid) {
          <p class="text-sm text-rose-400">Username is required.</p>
        }
      </div>

      <div class="space-y-2">
        <label class="text-sm font-medium text-gray-600" for="password">Password</label>
        <input
          id="password"
          type="password"
          formControlName="password"
          class="w-full rounded-2xl border border-slate-700 bg-mist-400 px-4 py-3 text-sm text-gray-900 outline-none transition focus:border-b-blue-900"
          placeholder="Enter your password"
        />
        @if (loginForm.controls.password.touched && loginForm.controls.password.invalid) {
          <p class="text-sm text-rose-400">Password is required.</p>
        }
      </div>

      @if (errorMessage()) {
        <div class="rounded-2xl border border-rose-500/40 bg-rose-500/10 px-4 py-3 text-sm text-rose-300">
          {{ errorMessage() }}
        </div>
      }

      <button
        type="submit"
        class="w-full rounded-2xl bg-gray-800 px-4 py-3 text-sm font-semibold text-mist-200 transition hover:border-b-blue-800 disabled:cursor-not-allowed disabled:opacity-70"
        [disabled]="isSubmitting()"
      >
        @if (isSubmitting()) {
          Signing in...
        } @else {
          Sign in
        }
      </button>
    </form>
  </div>
</section>
