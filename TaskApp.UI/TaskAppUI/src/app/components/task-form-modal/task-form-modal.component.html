<div class="fixed inset-0 z-50 flex items-center justify-center bg-slate-900/70 px-4">
  <div class="w-full max-w-xl rounded-3xl border border-slate-700 bg-white p-6 shadow-2xl">
    <div class="flex items-center justify-between gap-4">
      <div>
        <p class="text-sm uppercase tracking-[0.3em] text-slate-500">Create task</p>
        <h2 class="text-2xl font-semibold text-slate-800">New task</h2>
      </div>
      <button type="button" class="text-sm font-medium text-slate-500" (click)="closeCreateModal(false)">Close</button>
    </div>

    @if (createTaskForm) {
    <form class="mt-6 space-y-4" [formGroup]="createTaskForm" (ngSubmit)="submitCreateTask()">
      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700" for="task-name">Title</label>
        <input id="task-name" formControlName="name" class="w-full rounded-2xl border border-slate-300 px-3 py-2"
          placeholder="Task title" />
      </div>

      <div>
        <label class="mb-1 block text-sm font-medium text-slate-700" for="task-description">Description</label>
        <textarea id="task-description" formControlName="description" rows="4"
          class="w-full rounded-2xl border border-slate-300 px-3 py-2" placeholder="Describe the task"></textarea>
      </div>

      <div class="grid gap-4 md:grid-cols-2">
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700" for="task-due-date">Due date</label>
          <input id="task-due-date" type="date" formControlName="dueDate"
            class="w-full rounded-2xl border border-slate-300 px-3 py-2" />
        </div>

        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700" for="task-status">Status</label>
          <select id="task-status" formControlName="statusId"
            class="w-full rounded-2xl border border-slate-300 px-3 py-2">
            @for (status of statuses; track status.id) {
            <option [value]="status.id">{{ status.name }}</option>
            }
          </select>
        </div>
      </div>

      <div class="grid gap-4 md:grid-cols-1">
        <div>
          <label class="mb-1 block text-sm font-medium text-slate-700" for="task-status">Assigned To</label>
          <select id="task-status" formControlName="assignedToId"
            class="w-full rounded-2xl border border-slate-300 px-3 py-2">
            @for (user of users; track user.id) {
            <option [value]="user.id">{{ user.firstName }} {{ user.lastName }} ({{ user.username }})</option>
            }
          </select>
        </div>
      </div>

      <div class="flex justify-end gap-3 pt-2">
        <button type="button" class="rounded-2xl border border-slate-300 px-4 py-2 text-sm font-medium text-slate-600"
          (click)="closeCreateModal(false)">Cancel</button>
        <button type="submit" class="rounded-2xl bg-slate-900 px-4 py-2 text-sm font-semibold text-white" [disabled]="isSubmitting()">Create
          task</button>
      </div>
    </form>
    }
  </div>
</div>
