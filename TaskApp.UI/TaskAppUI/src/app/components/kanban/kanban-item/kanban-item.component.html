<div class="rounded-2xl border border-slate-700 bg-mist-300/80 p-4 shadow-sm mb-2">
  <div class="flex items-center justify-end">
      <span class="rounded-full bg-mist-400 px-3 py-1 text-xs " (click)="editTask()">Edit</span>
    </div>
  <div class="flex items-start justify-between gap-3">
    <div>
      <h3 class="font-semibold ">{{ task.name }}</h3>
      <p class="mt-1 text-sm ">{{ task.description }}</p>
    </div>
  </div>
  <div class="mt-3 flex items-center justify-between text-xs ">
    <span>Due {{ task.dueDate | date:'shortDate' }}</span>
    <span>{{ task.assignedTo?.username ?? 'Unassigned' }}</span>
  </div>
</div>
